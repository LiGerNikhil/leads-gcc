<!DOCTYPE html>
{% extends 'base.html' %}
{% load static %}

{% block title %}Reset Password - GCC Loan Portal{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-slate-800">Reset Password</h1>
    <p class="text-sm text-slate-500 mt-1">Set a new password for <strong>{{ reset_user.get_full_name }}</strong></p>
  </div>
  <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
    <form method="post">
      {% csrf_token %}
      <div class="mb-4">
        <label class="block text-sm font-medium text-slate-700 mb-1.5">New Password</label>
        <input type="password" name="password" required minlength="6" class="w-full px-4 py-2.5 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
      </div>
      <div class="flex items-center justify-end space-x-3">
        <a href="{% url 'user_list' %}" class="px-4 py-2 text-sm font-medium text-slate-600 bg-slate-100 rounded-lg hover:bg-slate-200 transition-colors">Cancel</a>
        <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-amber-600 rounded-lg hover:bg-amber-700 transition-colors">Reset Password</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
