<form method="post" action="{% if edit_user %}{% url 'user_edit' edit_user.id %}{% else %}{% url 'user_create' %}{% endif %}">
  {% csrf_token %}
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">First Name</label>
      <input type="text" name="first_name" value="{{ form.first_name.value|default:'' }}" required class="w-full px-4 py-2.5 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
      {% if form.first_name.errors %}<p class="mt-1 text-xs text-red-500">{{ form.first_name.errors.0 }}</p>{% endif %}
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Last Name</label>
      <input type="text" name="last_name" value="{{ form.last_name.value|default:'' }}" required class="w-full px-4 py-2.5 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
      {% if form.last_name.errors %}<p class="mt-1 text-xs text-red-500">{{ form.last_name.errors.0 }}</p>{% endif %}
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
      <input type="email" name="email" value="{{ form.email.value|default:'' }}" required class="w-full px-4 py-2.5 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
      {% if form.email.errors %}<p class="mt-1 text-xs text-red-500">{{ form.email.errors.0 }}</p>{% endif %}
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Employee Code</label>
      <input type="text" name="employee_code" value="{{ form.employee_code.value|default:'' }}" class="w-full px-4 py-2.5 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Role</label>
      <select name="role" required class="w-full px-4 py-2.5 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        {% for value, label in form.role.field.choices %}
        <option value="{{ value }}" {% if form.role.value == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">State</label>
      <select name="state" class="w-full px-4 py-2.5 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white">
        <option value="">Select State...</option>
        {% for value, label in form.state.field.choices %}
        <option value="{{ value }}" {% if form.state.value == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Phone</label>
      <input type="text" name="phone" value="{{ form.phone.value|default:'' }}" class="w-full px-4 py-2.5 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Password{% if not edit_user %} <span class="text-red-500">*</span>{% endif %}</label>
      <input type="password" name="password" {% if not edit_user %}required{% endif %} class="w-full px-4 py-2.5 text-sm border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="{% if edit_user %}Leave blank to keep current{% else %}At least 6 characters{% endif %}">
    </div>
  </div>
  <div class="mt-4">
    <label class="flex items-center">
      <input type="checkbox" name="is_active" {% if form.is_active.value %}checked{% endif %} class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
      <span class="ml-2 text-sm text-slate-700">Active</span>
    </label>
  </div>
  <div class="flex items-center justify-end space-x-3 mt-6 pt-4 border-t border-slate-200">
    <button type="button" onclick="closeModal('editUserModal')" class="px-4 py-2 text-sm font-medium text-slate-600 bg-slate-100 rounded-lg hover:bg-slate-200 transition-colors">Cancel</button>
    <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors">Save Changes</button>
  </div>
</form>
