<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Sent - Loan Management Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-blue-600/5 via-slate-50 to-slate-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-green-500 rounded-xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-green-200/50">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
      </div>
      <h1 class="text-2xl font-bold text-slate-800">Check Your Email</h1>
      <p class="text-sm text-slate-500 mt-1">We've sent a password reset link to your registered email address.</p>
    </div>
    <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-200 p-8 text-center">
      <p class="text-sm text-slate-600 mb-4">Didn't receive the email? Check your spam folder or try again.</p>
      <a href="{% url 'password_reset' %}" class="text-sm font-medium text-blue-600 hover:text-blue-700 transition-colors">Resend Reset Link</a>
      <div class="mt-4 pt-4 border-t border-slate-100">
        <a href="{% url 'login' %}" class="text-sm font-medium text-slate-600 hover:text-slate-700 transition-colors">&larr; Back to Sign In</a>
      </div>
    </div>
  </div>
</body>
</html>
