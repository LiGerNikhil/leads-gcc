<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password - Loan Management Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-blue-600/5 via-slate-50 to-slate-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-blue-600 rounded-xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200/50">
        <span class="text-white font-bold text-xl">G</span>
      </div>
      <h1 class="text-2xl font-bold text-slate-800">Set New Password</h1>
      <p class="text-sm text-slate-500 mt-1">Enter your new password below.</p>
    </div>
    <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-200 p-8">
      <form method="post">
        {% csrf_token %}
        {% if form.errors %}
          <div class="mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-sm text-red-600">Please correct the errors below.</div>
        {% endif %}
        <div class="mb-4">
          <label for="id_new_password1" class="block text-sm font-medium text-slate-700 mb-1.5">New Password</label>
          {{ form.new_password1 }}
          <p class="mt-1 text-xs text-slate-400">Minimum 8 characters, not entirely numeric.</p>
        </div>
        <div class="mb-6">
          <label for="id_new_password2" class="block text-sm font-medium text-slate-700 mb-1.5">Confirm New Password</label>
          {{ form.new_password2 }}
        </div>
        <button type="submit" class="w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors shadow-md shadow-blue-200/50">
          Reset Password
        </button>
      </form>
    </div>
  </div>
</body>
</html>
