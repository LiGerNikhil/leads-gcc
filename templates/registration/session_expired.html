<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session Expired - GCC Loan Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-[420px]">
    <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-200 overflow-hidden">
      <div class="px-8 pt-10 pb-6 text-center">
        <img src="{% static 'images/logo.png' %}" alt="GCC Logo" class="h-20 w-auto mx-auto">
        <h1 class="mt-5 text-xl font-bold text-slate-800">Session Expired</h1>
        <p class="text-sm text-slate-500 mt-1">Your session has timed out due to inactivity.</p>
      </div>
      <div class="px-8 pb-10 text-center">
        <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-amber-50 border border-amber-200 flex items-center justify-center">
          <svg class="w-10 h-10 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <p class="text-sm text-slate-600 mb-6">You were automatically logged out for security. Please sign in again to continue.</p>
        <a href="{% url 'login' %}" class="inline-flex items-center justify-center w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-lg transition-colors shadow-lg shadow-blue-200/50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
          <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
          Sign In Again
        </a>
      </div>
    </div>
    <p class="text-center text-xs text-slate-400 mt-6">&copy; {% now "Y" %} Government Credit Corporation. All rights reserved.</p>
  </div>
</body>
</html>
