<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Loan Management Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-blue-600/5 via-slate-50 to-slate-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-blue-600 rounded-xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200/50">
        <span class="text-white font-bold text-xl">G</span>
      </div>
      <h1 class="text-2xl font-bold text-slate-800">Forgot Password</h1>
      <p class="text-sm text-slate-500 mt-1">Enter your registered email to receive a reset link</p>
    </div>
    <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-200 p-8">
      <form method="post">
        {% csrf_token %}
        {% if form.email.errors %}
          <div class="mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-sm text-red-600">{{ form.email.errors.0 }}</div>
        {% endif %}
        <div class="mb-6">
          <label for="id_email" class="block text-sm font-medium text-slate-700 mb-1.5">Email Address</label>
          {{ form.email }}
        </div>
        <button type="submit" class="w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors shadow-md shadow-blue-200/50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
          Send Reset Link
        </button>
      </form>
      <div class="mt-6 text-center">
        <a href="{% url 'login' %}" class="text-sm font-medium text-blue-600 hover:text-blue-700 transition-colors">&larr; Back to Sign In</a>
      </div>
    </div>
  </div>
</body>
</html>
