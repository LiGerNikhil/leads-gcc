{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Error - GCC Loan Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-lg text-center">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 sm:p-12">
      <div class="w-20 h-20 mx-auto mb-6 bg-red-50 rounded-full flex items-center justify-center">
        <svg class="w-10 h-10 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
      </div>
      <h1 class="text-6xl sm:text-7xl font-bold text-slate-800 mb-2">500</h1>
      <p class="text-lg font-medium text-slate-600 mb-1">Server Error</p>
      <p class="text-sm text-slate-500 mb-8 max-w-sm mx-auto">Something went wrong on our end. Please try again later or contact support.</p>
      <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
        <a href="javascript:location.reload()" class="w-full sm:w-auto px-5 py-2.5 text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors text-center">Retry</a>
        <a href="{% url 'dashboard' %}" class="w-full sm:w-auto px-5 py-2.5 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors text-center">Go to Dashboard</a>
      </div>
    </div>
    <p class="mt-6 text-xs text-slate-400">&copy; {% now "Y" %} GCC Loan Portal &mdash; Growarth Capital</p>
  </div>
</body>
</html>
