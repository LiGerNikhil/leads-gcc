{% load static %}
<header class="sticky top-0 z-30 bg-white border-b border-slate-200 shadow-sm">
  <div class="flex items-center justify-between h-16 px-6">
    <div class="flex items-center flex-1">
      <button id="sidebarToggle" onclick="toggleSidebar()" class="lg:hidden mr-4 p-1.5 text-slate-500 hover:text-slate-700 hover:bg-slate-100 rounded-lg transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="relative w-full max-w-md hidden sm:block">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </div>
        <input type="text" class="w-full pl-10 pr-4 py-2 text-sm text-slate-700 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 placeholder-slate-400" placeholder="Search applications, users...">
      </div>
    </div>
    <div class="flex items-center space-x-4">
      <div class="relative">
        <button id="notificationBell" class="relative p-2 text-slate-500 hover:text-slate-700 hover:bg-slate-100 rounded-lg transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
          <span id="notificationBadge" class="absolute -top-0.5 -right-0.5 min-w-[16px] h-4 bg-red-500 rounded-full text-white text-[9px] font-bold flex items-center justify-center px-1 hidden">0</span>
        </button>
        <div id="notificationDropdown" class="hidden absolute right-0 mt-2 w-80 sm:w-96 bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden z-50">
          <div class="px-4 py-3 border-b border-slate-100 flex items-center justify-between">
            <h3 class="text-sm font-semibold text-slate-700">Notifications</h3>
            <button id="markAllRead" class="text-xs text-blue-600 hover:text-blue-800 font-medium">Mark all as read</button>
          </div>
          <div id="notificationList" class="max-h-80 overflow-y-auto divide-y divide-slate-50">
            <div class="px-4 py-8 text-center text-sm text-slate-400">Loading...</div>
          </div>
        </div>
      </div>
      <div class="relative" x-data="{ open: false }">
        <button id="userDropdownButton" data-dropdown-toggle="userDropdown" class="flex items-center space-x-3 p-2 rounded-lg hover:bg-slate-100 transition-colors">
          <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white text-sm font-medium">
            {{ user.first_name|first|default:user.username|first|upper }}
          </div>
          <div class="hidden md:block text-left">
            <p class="text-sm font-medium text-slate-700 truncate max-w-[120px]">{{ user.get_full_name|default:user.username }}</p>
            <p class="text-xs text-slate-500">{{ user.get_role_display }}</p>
          </div>
          <svg class="w-4 h-4 text-slate-400 hidden sm:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div id="userDropdown" class="hidden z-50 w-56 bg-white rounded-xl shadow-lg border border-slate-200 py-2">
          <div class="px-4 py-3 border-b border-slate-100">
            <p class="text-sm font-medium text-slate-700">{{ user.get_full_name|default:user.username }}</p>
            <p class="text-xs text-slate-500">{{ user.email|default:'' }}</p>
          </div>
          <a href="{% url 'profile' %}" class="block px-4 py-2 text-sm text-slate-600 hover:bg-slate-50">My Profile</a>
          <div class="border-t border-slate-100 mt-1 pt-1">
            <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50">Sign Out</button>
          </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>

<script>
(function(){
  var list = document.getElementById('notificationList');
  var badge = document.getElementById('notificationBadge');
  var bell = document.getElementById('notificationBell');
  var dd = document.getElementById('notificationDropdown');
  var markAll = document.getElementById('markAllRead');
  var visible = false;

  function load() {
    fetch('{% url "notification_list" %}?limit=10&unread_first=1')
      .then(function(r){ return r.json(); })
      .then(function(d){
        var u = d.unread_count || 0;
        if (u > 0) { badge.textContent = u > 99 ? '99+' : u; badge.classList.remove('hidden'); }
        else { badge.classList.add('hidden'); }
        if (visible) render(d.notifications);
      });
  }

  function render(ns) {
    if (!ns || !ns.length) { list.innerHTML = '<div class="px-4 py-8 text-center text-sm text-slate-400">No notifications yet.</div>'; return; }
    var h = '';
    for (var i = 0; i < ns.length; i++) {
      var n = ns[i];
      var appUrl = n.app_display_id ? '{% url "loan_detail" application_id=0 %}'.replace('0', n.application_id) : '#';
      h += '<div class="px-4 py-3 hover:bg-slate-50 transition-colors' + (n.is_read ? '' : ' bg-blue-50/50') + '">';
      h += '<div class="flex items-start space-x-3">';
      h += '<div class="flex-shrink-0 mt-0.5"><svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>';
      h += '<div class="flex-1 min-w-0"><p class="text-xs font-medium text-slate-700">' + n.title + '</p>';
      h += '<p class="text-xs text-slate-500 mt-0.5">' + n.message + '</p>';
      h += '<div class="flex items-center justify-between mt-1">';
      h += '<a href="' + appUrl + '" class="text-xs text-blue-600 font-medium">View</a>';
      h += '<span class="text-xs text-slate-400">' + ago(n.created_at) + '</span>';
      if (!n.is_read) h += '<button data-nid="' + n.id + '" class="mark-one text-xs text-slate-400 hover:text-slate-600">Mark read</button>';
      h += '</div></div></div></div>';
    }
    list.innerHTML = h;
    list.querySelectorAll('.mark-one').forEach(function(b){
      b.addEventListener('click', function(){
        var f = new FormData(); f.append('id', b.dataset.nid); f.append('csrfmiddlewaretoken', '{{ csrf_token }}');
        fetch('{% url "notification_mark_read" %}', { method: 'POST', body: f }).then(function(){ load(); });
      });
    });
  }

  function ago(iso) {
    var s = Math.floor((new Date() - new Date(iso)) / 1000);
    if (s < 60) return 'just now';
    var m = Math.floor(s / 60); if (m < 60) return m + 'm ago';
    var h = Math.floor(m / 60); if (h < 24) return h + 'h ago';
    var d = Math.floor(h / 24); if (d < 30) return d + 'd ago';
    return new Date(iso).toLocaleDateString();
  }

  bell.addEventListener('click', function(e){
    e.stopPropagation();
    visible = !visible;
    dd.classList.toggle('hidden', !visible);
    if (visible) load();
  });

  markAll.addEventListener('click', function(){
    var f = new FormData(); f.append('id', 'all'); f.append('csrfmiddlewaretoken', '{{ csrf_token }}');
    fetch('{% url "notification_mark_read" %}', { method: 'POST', body: f }).then(function(){ load(); });
  });

  document.addEventListener('click', function(e){
    if (!bell.contains(e.target) && !dd.contains(e.target)) {
      dd.classList.add('hidden'); visible = false;
    }
  });

  load();
  setInterval(load, 30000);
})();
</script>
